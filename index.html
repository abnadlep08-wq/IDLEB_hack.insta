<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taif Instagram Hunter - حقيقي 100%</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-section {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .profile-image-container {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #e94560, #533483, #0f3460);
            animation: rotate 4s linear infinite;
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        @keyframes rotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .tool-title {
            text-align: center;
            margin: 40px 0;
            font-size: 2.5em;
        }

        .tool-title span {
            background: rgba(233, 69, 96, 0.2);
            padding: 10px 30px;
            border-radius: 50px;
            border: 2px solid #e94560;
        }

        .real-badge {
            background: #e94560;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-align: center;
            margin: 20px auto;
            max-width: 500px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-field {
            margin-bottom: 20px;
        }

        .input-field label {
            display: block;
            margin-bottom: 10px;
            color: #533483;
            font-weight: bold;
        }

        .input-field input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .start-btn, .stop-btn, .status-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            min-width: 200px;
        }

        .start-btn {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
        }

        .stop-btn {
            background: linear-gradient(45deg, #dc3545, #c82333);
            color: white;
        }

        .status-btn {
            background: linear-gradient(45deg, #ffc107, #fd7e14);
            color: white;
        }

        .stop-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-bottom: 4px solid #e94560;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #e94560;
        }

        .workflow-status {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: center;
            color: #333;
        }

        .active-status {
            color: #28a745;
            font-weight: bold;
        }

        .results-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .result-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            background: #f8f9fa;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-image-container">
                <img src="https://i.ibb.co/d4DfRnH2/Pookie-Spide-WEBP-0.jpg" alt="Profile" class="profile-image" id="profileImage">
            </div>
        </div>

        <div class="tool-title">
            <span>🔥 من صنع IDLEB X استمتع 🔥</span>
        </div>

        <div class="real-badge">
            🎯 صيد حقيقي 100% 
        </div>

        <div class="input-section">
            <div class="input-field">
                <label>🤖 توكن البوت</label>
                <input type="text" id="botToken" placeholder="أدخل توكن البوت">
            </div>
            <div class="input-field">
                <label>👤 ايدي التليجرام</label>
                <input type="text" id="telegramId" placeholder="أدخل ايدي التليجرام">
            </div>

            <div class="button-group">
                <button class="start-btn" onclick="startWorkflow()">🚀 تشغيل الصيد</button>
                <button class="status-btn" onclick="checkStatus()">🔄 التحقق من الحالة</button>
                <button class="stop-btn" id="stopBtn" onclick="stopWorkflow()" disabled>⏹️ إيقاف</button>
            </div>
        </div>

        <div class="workflow-status" id="workflowStatus">
            ⏳ الحالة: في انتظار التشغيل...
        </div>

        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-value" id="goodIg">0</div>
                <div>✅ تم الصيد</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total">0</div>
                <div>🔄 تم الفحص</div>
            </div>
        </div>

        <div class="results-section" id="results">
            <div style="text-align: center; color: #666; padding: 20px;">
                النتائج راح تظهر هنا...
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://t.me/abn_adlep_x" style="color: white; text-decoration: none;">🥷🏾🔥 MOOHAMED || محمد</a>
    </div>

    <script>
        const GITHUB_USER = 'abnadlep08-wq'; // غيريه لاسم مستخدمك
        const REPO_NAME = 'IDLEB_hack.insta'; // اسم المستودع

        async function startWorkflow() {
            const token = document.getElementById('botToken').value;
            const chatId = document.getElementById('telegramId').value;
            
            if (!token || !chatId) {
                alert('دخلي التوكن والايدي');
                return;
            }

            // حفظ الإعدادات
            localStorage.setItem('botToken', token);
            localStorage.setItem('telegramId', chatId);

            // تشغيل GitHub Action
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/actions/workflows/hunter.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: {
                        token: token,
                        chat_id: chatId
                    }
                })
            });

            if (response.ok) {
                document.getElementById('workflowStatus').innerHTML = '✅ تم التشغيل! جاري الصيد...';
                document.getElementById('stopBtn').disabled = false;
            }
        }

        async function checkStatus() {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/actions/runs?status=in_progress`);
            const data = await response.json();
            
            if (data.total_count > 0) {
                document.getElementById('workflowStatus').innerHTML = '🟢 نشط: الصيد شغال';
                document.getElementById('stopBtn').disabled = false;
            } else {
                document.getElementById('workflowStatus').innerHTML = '🔴 متوقف: لا توجد عمليات نشطة';
                document.getElementById('stopBtn').disabled = true;
            }
        }

        async function stopWorkflow() {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/actions/runs`);
            const data = await response.json();
            
            if (data.workflow_runs && data.workflow_runs.length > 0) {
                const runId = data.workflow_runs[0].id;
                await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/actions/runs/${runId}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                    }
                });
            }
            
            document.getElementById('workflowStatus').innerHTML = '⏹️ تم الإيقاف';
            document.getElementById('stopBtn').disabled = true;
        }

        // تحميل الإعدادات المحفوظة
        document.getElementById('botToken').value = localStorage.getItem('botToken') || '';
        document.getElementById('telegramId').value = localStorage.getItem('telegramId') || '';
    </script>
</body>
</html>
